server:
  port: 8080

spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:gatewaydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

account-service:
  base-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,metrics